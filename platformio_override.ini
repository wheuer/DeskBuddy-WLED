[platformio]
default_envs = DeskBuddy

[env:DeskBuddy]
board = esp32dev
platform = ${esp32.platform}
platform_packages = ${esp32.platform_packages}
custom_usermods = DeskBuddy-Control
build_unflags = ${common.build_unflags}
build_flags = ${common.build_flags} ${esp32.build_flags} 
    -D WLED_RELEASE_NAME=\"DeskBuddy\"  
    ; -D PIXEL_COUNTS=288,288                         # Default LED count
    ; -D DATA_PINS=26,27
    ; -D LED_TYPES=TYPE_WS2812_RGB,TYPE_WS2812_RGB    # LED Type
    ; -D ABL_MILLIAMPS_DEFAULT=500                    # Assume only USB2.0 minimum current
    ; -D LED_MILLIAMPS_DEFAULT=15                     # 15 mA per LED
    -D WLED_DISABLE_OTA
    -D WLED_DISABLE_ALEXA
    -D WLED_DISABLE_HUESYNC
    -D WLED_DISABLE_LOXONE
    -D WLED_DISABLE_INFRARED
    -D WLED_DISABLE_WEBSOCKETS
    -D WLED_DISABLE_MQTT
    -D WLED_DISABLE_ADALIGHT
    -D WLED_DISABLE_PXMAGIC
    -D WLED_DISABLE_ESPNOW
    ; -D WLED_DEBUG
lib_deps = ${esp32.lib_deps}
monitor_filters = esp32_exception_decoder
board_build.partitions = ${esp32.large_partitions}
board_build.flash_mode = dio
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
upload_speed = 921600
